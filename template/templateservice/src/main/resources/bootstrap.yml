spring:
  application:
    name: mstemplate  # 应用名称
  profiles:
    active: dev     # 激活的环境（通过环境变量RUN_ENV指定）
  cloud:
    nacos:
      discovery:           # Nacos服务发现配置
        namespace: 92d7baa7-5f7f-4d19-8a3d-70149c11f5fb  # 命名空间（关联环境变量）
        server-addr: 8.140.214.12:8848           # Nacos地址（环境变量）
      config:              # Nacos配置中心配置
        namespace: 92d7baa7-5f7f-4d19-8a3d-70149c11f5fb
        server-addr: 8.140.214.12:8848
        shared-configs:
          - data-id: shared-thread-dev.yaml
          - data-id: shared-redis-dev.yaml
          - data-id: share-caffeine-dev.yaml


#        file-extension: yaml  # 配置文件格式为yaml

# 日志输出格式配置
logging:
  pattern:
    console: '[%thread] %-5level %logger{36} - %msg%n'